<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon Circle -->
  <circle cx="40" cy="40" r="35" fill="url(#logoGradient)"/>

  <!-- Two overlapping circles representing peers -->
  <circle cx="22" cy="32" r="12" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <circle cx="58" cy="32" r="12" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>

  <!-- Connection line -->
  <line x1="36" y1="28" x2="32" y2="36" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="36" y2="44" stroke="white" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center play button -->
  <polygon points="40,28 48,35 40,42" fill="white" opacity="0.95"/>

  <!-- Bottom accent -->
  <path d="M 26 48 L 31 48 L 31 54 Q 31 55 29 55 L 26 55 Z" fill="white" opacity="0.8"/>
  <path d="M 38 49 L 43 49 L 43 55 Q 43 56 41 56 L 38 56 Z" fill="white" opacity="0.9"/>
  <path d="M 50 48 L 55 48 L 55 54 Q 55 55 53 55 L 50 55 Z" fill="white" opacity="0.8"/>

  <!-- Text: PeerLearn -->
  <text x="90" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#1e293b" letter-spacing="-0.5">
    PeerLearn
  </text>
</svg>
